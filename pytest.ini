[pytest]
addopts =
    --base-url=https://qa-playground-automation-testing.onrender.com
    --screenshot=only-on-failure
    --video=retain-on-failure
    --tracing=retain-on-failure
    --output=reports/artifacts
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results
    -ra

testpaths = tests
bdd_features_base_dir = features/

markers =
    smoke: fast, high-value checks of the core happy paths
    bug: test that pins down / documents a known intentional bug from BUGS.md
